name: Daily Economy News Bot

on:
  schedule:
    - cron: '0 21 * * *'    # 한국 시간 아침 6시 (UTC 21시)
    - cron: '0 9 * * *'     # 한국 시간 저녁 6시 (UTC 09시)
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 내 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설치하기
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 필요한 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 봇 실행하고 메일 보내기
        # ▼▼▼ 이 부분이 핵심입니다! 비밀번호를 파이썬에게 건네주는 코드 ▼▼▼
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
        # ▲▲▲ 위 3줄의 들여쓰기가 run: 명령보다 안쪽으로 들어가 있어야 합니다. ▲▲▲
        run: python main.py
