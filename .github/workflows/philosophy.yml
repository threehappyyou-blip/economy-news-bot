name: Warm Insight Philosophy Poster

on:
  schedule:
    # 매일 UTC 22:00 실행 (미국 뉴욕 서머타임(EDT) 기준 오후 6시 / 표준시(EST) 기준 오후 5시)
    - cron: '0 22 * * *'
  workflow_dispatch: # 수동으로 버튼을 눌러서 즉시 실행할 수 있게 함

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests feedparser google-genai Pillow

    - name: Run Philosophy Bot
      env:
        PYTHONUNBUFFERED: "1"          # 실시간 로그 출력
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        WP_URL: ${{ secrets.WP_URL }}
        WP_USERNAME: ${{ secrets.WP_USERNAME }}
        WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
      # 🚨 아래 명령어에 'philosophy'가 붙어있어야만 철학 글이 발행됩니다!
      run: python main.py philosophy
