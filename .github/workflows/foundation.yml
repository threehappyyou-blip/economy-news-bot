name: Warm Insight Foundation Poster

on:
  schedule:
    # 매일 UTC 12:00 실행 (미국 뉴욕 표준시 EST 기준 오전 7시 / 서머타임 EDT 기준 오전 8시)
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests feedparser google-genai Pillow

    - name: Run Foundation Bot
      env:
        PYTHONUNBUFFERED: "1"
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        WP_URL: ${{ secrets.WP_URL }}
        WP_USERNAME: ${{ secrets.WP_USERNAME }}
        WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
      # 🚨 끝에 'foundation' 이라고 적혀있어야 기초 가이드를 작성합니다.
      run: python main.py foundation
